name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_API_URL: http://3.36.108.114:8005

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://3.36.108.114:8005

      - name: Tar standalone files
        run: |
          cd frontend/.next
          tar -czf standalone.tar.gz standalone/

      - name: Stop services & clean
        uses: appleboy/ssh-action@master
        with:
          host: 3.36.108.114
          port: 31222
          username: Administrator
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            $ProjectDir = "C:\Users\Administrator\Documents\aiproject\exhibition-meeting-module"
            $env:PM2_HOME = "C:\Users\Administrator\.pm2"
            try { pm2 delete exhibition-meeting-frontend } catch { Write-Host "skip" }
            try { pm2 delete exhibition-meeting-backend } catch { Write-Host "skip" }
            cd $ProjectDir
            if (Test-Path "frontend\standalone") { Remove-Item -Path "frontend\standalone" -Recurse -Force }
            New-Item -ItemType Directory -Path "frontend\standalone" -Force | Out-Null

      - name: Upload standalone
        uses: horochx/deploy-via-scp@v1.0.0
        with:
          host: 3.36.108.114
          port: 31222
          username: Administrator
          key: ${{ secrets.EC2_SSH_KEY }}
          source: frontend/.next/standalone/*
          target: C:\Users\Administrator\Documents\aiproject\exhibition-meeting-module\frontend\standalone
          strip_components: 3

      - name: Start services
        uses: appleboy/ssh-action@master
        with:
          host: 3.36.108.114
          port: 31222
          username: Administrator
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            $ProjectDir = "C:\Users\Administrator\Documents\aiproject\exhibition-meeting-module"
            $env:PM2_HOME = "C:\Users\Administrator\.pm2"
            cd "$ProjectDir\backend"
            git pull origin main
            pip install -r requirements.txt
            cd $ProjectDir
            pm2 start "$ProjectDir\pm2.frontend.json"
            pm2 start "$ProjectDir\pm2.backend.json"
            pm2 save
